name: Release

# Publish strategy: VERSION BUMP.
# Pushing to main only publishes when manifest.json's "version" is higher than the
# latest published GitHub Release tag (vX.Y.Z). Normal code pushes that don't change
# the version do nothing. A "Run workflow" button is also provided for manual runs.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Publish even if the version didn't change"
        type: boolean
        default: false

permissions:
  contents: write   # needed to create a GitHub Release

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Read manifest version
        id: ver
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish
        id: decide
        run: |
          MANIFEST_VER="${{ steps.ver.outputs.version }}"
          # Latest release tag like v1.5.0 -> 1.5.0 (empty if none yet).
          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          LAST_VER="${LAST_TAG#v}"
          echo "manifest=$MANIFEST_VER last_published=$LAST_VER force=${{ github.event.inputs.force }}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$LAST_VER" ]; then
            # No prior release: publish the current version once.
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [ "$MANIFEST_VER" != "$LAST_VER" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    # secrets can't be used directly in step-level `if:`, so surface presence flags
    # as job-level env vars and gate each store step on those.
    env:
      HAS_CHROME: ${{ secrets.CHROME_CLIENT_ID != '' }}
      HAS_EDGE: ${{ secrets.EDGE_CLIENT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP
        run: bash package.sh

      # Each store step is gated on its secrets and won't fail the whole run, so one
      # store being unconfigured or rejecting the upload never blocks the other.
      - name: Publish to Chrome Web Store
        if: env.HAS_CHROME == 'true'
        continue-on-error: true
        uses: mnao305/chrome-extension-upload@v5
        with:
          file-path: dist/extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

      # Edge Add-ons. Runs only once EDGE_* secrets are set (account still verifying).
      # Product ID: 0683f83c-0e7e-4085-b6e7-14b02d74832d
      - name: Publish to Edge Add-ons
        if: env.HAS_EDGE == 'true'
        continue-on-error: true
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: dist/extension.zip
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: v${{ needs.check.outputs.version }}
          generate_release_notes: true
          files: dist/extension.zip
