<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ORO — Logo / Icon options</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
:root{ --accent:#22C55E; --blue:#3B82F6; }
*{box-sizing:border-box}
body{margin:0;background:#0F172A;color:#F8FAFC;font-family:'IBM Plex Sans',system-ui,sans-serif;padding:28px}
h1{font-size:18px;margin:0 0 4px}
.sub{color:#94A3B8;font-size:13px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.card{background:#1E293B;border:1px solid #2c3a52;border-radius:12px;padding:16px}
.row{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.name{font-weight:700;font-size:14px}
.concept{color:#94A3B8;font-size:12px;font-family:'JetBrains Mono',monospace}
.badges{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
/* gradient badge (as in app header) */
.badge{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto;
  background:linear-gradient(135deg,var(--accent),var(--blue));color:#06210f;box-shadow:0 4px 14px rgba(34,197,94,.35)}
.badge.lg{width:56px;height:56px;border-radius:14px}
.badge.term{background:transparent;border:1px solid var(--accent);color:var(--accent);box-shadow:0 0 10px rgba(34,255,136,.5)}
.badge.light{background:#fff;color:#0f172a;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.badge.solid{background:var(--accent);color:#06210f}
.chip{display:grid;place-items:center;width:40px;height:40px;border-radius:10px;border:1px solid #2c3a52;background:#111c30;color:var(--accent)}
.tiny{display:flex;gap:6px;align-items:center}
.tiny .b{width:16px;height:16px;border-radius:4px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--blue));color:#06210f}
.note{color:#64748b;font-size:11px;margin-top:8px}
.legend{display:flex;gap:18px;flex-wrap:wrap;color:#94A3B8;font-size:12px;margin:18px 0 8px}
.legend span{display:flex;align-items:center;gap:6px}
.dot{width:12px;height:12px;border-radius:3px}
</style>
</head>
<body>
<h1>Open Resource Override — logo / icon candidates</h1>
<div class="sub">Each mark shown as: gradient badge (header), terminal outline, light badge, mono chip, and 16px favicon size. Pick a number.</div>
<div class="legend">
  <span><span class="dot" style="background:linear-gradient(135deg,#22C55E,#3B82F6)"></span>gradient badge</span>
  <span><span class="dot" style="background:transparent;border:1px solid #22FF88;box-shadow:0 0 8px #22ff88"></span>terminal</span>
  <span><span class="dot" style="background:#fff"></span>light</span>
  <span><span class="dot" style="background:#111c30;border:1px solid #2c3a52"></span>mono chip</span>
</div>
<div class="grid" id="grid"></div>

<script>
const S = (inner, sw=2) => `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
const Sx = (inner, size, sw=2) => `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;

const icons = [
  { n:"0 · Current", c:"list + arrow", i:`<path d="M4 7h16M4 12h10M4 17h7"/><path d="M17 14l4 3-4 3"/>` },
  { n:"1 · Swap", c:"redirect / swap", i:`<path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/>` },
  { n:"2 · Repeat", c:"override / replace", i:`<path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/>` },
  { n:"3 · Route", c:"reroute requests", i:`<circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>` },
  { n:"4 · Fork", c:"branch / intercept", i:`<circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v1a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><path d="M12 12v3"/>` },
  { n:"5 · Shuffle", c:"reroute / divert", i:`<path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2"/><path d="M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8"/><path d="m18 14 4 4-4 4"/>` },
  { n:"6 · Signpost", c:"redirect", i:`<path d="M12 13v8"/><path d="M12 3v3"/><path d="M4 6h13l3 3.5L17 13H4z"/>` },
  { n:"7 · Braces", c:"mock JSON", i:`<path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5c0 1.1.9 2 2 2h1"/><path d="M16 21h1a2 2 0 0 0 2-2v-5c0-1.1.9-2 2-2a2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1"/>` },
  { n:"8 · Bolt", c:"intercept / fast", i:`<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>` },
  { n:"9 · Braces + bolt", c:"mock + intercept", i:`<path d="M7 3H6a2 2 0 0 0-2 2v4a2 2 0 0 1-2 2 2 2 0 0 1 2 2v4c0 1.1.9 2 2 2h1"/><path d="M17 21h1a2 2 0 0 0 2-2v-4c0-1.1.9-2 2-2a2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1"/><path d="m12 8-2 4h4l-2 4"/>` },
  { n:"10 · Target", c:"match / intercept", i:`<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/>` },
];

const grid = document.getElementById('grid');
for (const ic of icons){
  const el = document.createElement('div');
  el.className='card';
  el.innerHTML = `
    <div class="row">
      <div class="badge lg">${Sx(ic.i,30)}</div>
      <div><div class="name">${ic.n}</div><div class="concept">${ic.c}</div></div>
    </div>
    <div class="badges">
      <div class="badge">${S(ic.i)}</div>
      <div class="badge term">${S(ic.i)}</div>
      <div class="badge light">${S(ic.i)}</div>
      <div class="chip">${S(ic.i)}</div>
      <div class="tiny" title="favicon sizes"><span class="b">${Sx(ic.i,12,2.4)}</span><span class="b" style="width:24px;height:24px;border-radius:6px">${Sx(ic.i,16)}</span></div>
    </div>`;
  grid.appendChild(el);
}
</script>
</body>
</html>
